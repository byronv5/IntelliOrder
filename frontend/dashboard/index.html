<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>店铺业绩监看大屏</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <div class="header-meta">
        <span id="updateTime">--</span>
        <span class="divider">|</span>
        <span id="clock">--:--:--</span>
      </div>
      <div class="header-main">
        <div class="header-decoration left"></div>
        <h1 class="title">店铺业绩监看大屏</h1>
        <div class="header-decoration right"></div>
      </div>
    </header>

    <section class="kpi-row">
      <div class="kpi-card" data-kpi="totalSales">
        <div class="kpi-label">总业绩</div>
        <div class="kpi-value"><span id="totalSales">--</span><small>万元</small></div>
        <div class="kpi-sub">目标 <span id="totalTarget">--</span> 万</div>
      </div>
      <div class="kpi-card" data-kpi="completion">
        <div class="kpi-label">整体完成率</div>
        <div class="kpi-value"><span id="overallCompletion">--</span><small>%</small></div>
        <div class="kpi-sub" id="completionStatus">--</div>
      </div>
      <div class="kpi-card" data-kpi="yoy">
        <div class="kpi-label">同比去年</div>
        <div class="kpi-value"><span id="yoyGrowth">--</span><small>%</small></div>
        <div class="kpi-sub">去年同期 <span id="lastYearSales">--</span> 万</div>
      </div>
      <div class="kpi-card" data-kpi="stores">
        <div class="kpi-label">在营店铺</div>
        <div class="kpi-value"><span id="storeCount">--</span><small>家</small></div>
        <div class="kpi-sub">达标 <span id="qualifiedCount">--</span> 家</div>
      </div>
    </section>

    <main class="main-grid">
      <div class="panel panel-wide">
        <div class="panel-header">
          <span class="panel-title">店铺业绩排名</span>
          <span class="panel-badge">实时</span>
        </div>
        <div class="panel-body">
          <div id="chartPerformance" class="chart"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">完成率分布</span>
        </div>
        <div class="panel-body">
          <div id="chartCompletion" class="chart"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">去年同期对比</span>
        </div>
        <div class="panel-body">
          <div id="chartYoy" class="chart"></div>
        </div>
      </div>

      <div class="panel panel-table">
        <div class="panel-header">
          <span class="panel-title">店铺明细</span>
        </div>
        <div class="panel-body table-wrap">
          <table class="store-table" id="storeTable">
            <thead>
              <tr>
                <th>排名</th>
                <th>店铺</th>
                <th>业绩(万)</th>
                <th>目标(万)</th>
                <th>完成率</th>
                <th>同比</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="storeTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
